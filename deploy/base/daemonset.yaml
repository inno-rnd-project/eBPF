apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: netobs-agent
  namespace: ebpf-project
  labels:
    app.kubernetes.io/name: netobs-agent
    app.kubernetes.io/part-of: ebpf-project
    app.kubernetes.io/component: network-observer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: netobs-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netobs-agent
        app.kubernetes.io/part-of: ebpf-project
        app.kubernetes.io/component: network-observer
    spec:
      serviceAccountName: netobs-agent
      hostPID: true
      containers:
        - name: netobs-agent
          image: netobs-agent:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - "-listen"
            - ":9810"
            - "-print-events=false"
          ports:
            - name: metrics
              containerPort: 9810
              protocol: TCP
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: sys-fs-bpf
              mountPath: /sys/fs/bpf
            - name: sys-kernel-btf
              mountPath: /sys/kernel/btf
              readOnly: true
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
      volumes:
        - name: sys-fs-bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: sys-kernel-btf
          hostPath:
            path: /sys/kernel/btf
            type: Directory
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
