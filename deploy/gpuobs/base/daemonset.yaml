apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpuobs-agent
  namespace: ebpf-project
  labels:
    app.kubernetes.io/name: gpuobs-agent
    app.kubernetes.io/part-of: ebpf-project
    app.kubernetes.io/component: gpu-observer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpuobs-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpuobs-agent
        app.kubernetes.io/part-of: ebpf-project
        app.kubernetes.io/component: gpu-observer
    spec:
      serviceAccountName: gpuobs-agent
      containers:
        - name: gpuobs-agent
          image: gpuobs-agent
          imagePullPolicy: IfNotPresent
          args:
            - "-listen"
            - ":9820"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # NVIDIA GPU Operator가 배포하는 container-toolkit은 NVIDIA_VISIBLE_DEVICES env를
            # 트리거로 `/dev/nvidia*` 디바이스와 `libnvidia-ml.so.1` 라이브러리를 컨테이너에
            # 자동 주입한다. NVIDIA_DRIVER_CAPABILITIES=utility는 NVML 질의에 필요한 최소 권한이다.
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility"
          ports:
            - name: metrics
              containerPort: 9820
              protocol: TCP
          # netobs와 달리 gpuobs는 eBPF 로딩이 필요 없어 privileged·hostPID·추가 capability 모두 불필요.
          # 런타임 체크리스트(#7)에서 nvidia-container-runtime 주입만으로 NVML 접근이 가능함을 확인했다.
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          # Phase 1 placeholder collector 기준 보수적 값으로 잡아두고 Phase 4에서 실측에 따라 튜닝한다.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
