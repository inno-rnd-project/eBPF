apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpuobs-agent
  namespace: ebpf-project
  labels:
    app.kubernetes.io/name: gpuobs-agent
    app.kubernetes.io/part-of: ebpf-project
    app.kubernetes.io/component: gpu-observer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpuobs-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpuobs-agent
        app.kubernetes.io/part-of: ebpf-project
        app.kubernetes.io/component: gpu-observer
    spec:
      serviceAccountName: gpuobs-agent
      # NVML이 호스트 PID 네임스페이스 기준 PID를 반환하므로, /proc/<pid>/cgroup 파싱으로
      # PID → Pod UID 귀속을 수행하려면 컨테이너가 호스트 PID 네임스페이스를 공유해야 한다.
      # privileged는 여전히 false로 두며, hostPID만 노출해 cgroup 정보 read-only 접근만 허용한다.
      hostPID: true
      containers:
        - name: gpuobs-agent
          image: gpuobs-agent
          imagePullPolicy: IfNotPresent
          args:
            - "-listen"
            - ":9820"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # NVIDIA GPU Operator가 배포하는 container-toolkit은 NVIDIA_VISIBLE_DEVICES env를
            # 트리거로 `/dev/nvidia*` 디바이스와 `libnvidia-ml.so.1` 라이브러리를 컨테이너에
            # 자동 주입한다. NVIDIA_DRIVER_CAPABILITIES=utility는 NVML 질의에 필요한 최소 권한이다.
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility"
          ports:
            - name: metrics
              containerPort: 9820
              protocol: TCP
          # gpuobs는 eBPF 로딩이 필요 없어 privileged와 추가 capability 모두 불필요하다.
          # Phase 3부터 PID → Pod 귀속을 위해 hostPID가 추가되지만, 컨테이너 권한은 read-only(/proc 조회) 수준에 머무른다.
          # nvidia-container-runtime 주입으로 NVML 접근이 가능함은 런타임 체크리스트(#7)에서 확인되었다.
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          # Phase 1 placeholder collector 기준 보수적 값으로 잡아두고 Phase 4에서 실측에 따라 튜닝한다.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
