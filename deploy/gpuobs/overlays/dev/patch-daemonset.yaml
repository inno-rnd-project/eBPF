apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpuobs-agent
  namespace: ebpf-project
spec:
  template:
    spec:
      # canary 노드에만 배포한다. 두 라벨 모두 있어야 매치되며, 현재 클러스터에서는
      # `accelerator=nvidia`와 `observability.netobs/canary=true`를 동시에 만족하는
      # 노드가 GPU 한 대이므로 netobs dev와 동일한 노드에 함께 떨어진다.
      nodeSelector:
        accelerator: nvidia
        observability.netobs/canary: "true"
      containers:
        - name: gpuobs-agent
          # 로컬에서 빌드한 이미지를 당기지 않고 바로 사용한다. Prod overlay에서는 IfNotPresent로 전환된다.
          imagePullPolicy: Never
